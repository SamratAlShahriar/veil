name: Pub Score Check

on:
  push:
    branches: [main]

jobs:
  pub-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Dry run publish
        run: dart pub publish --dry-run