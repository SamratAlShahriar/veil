name: veil
description: >-
  Selectively apply animated visual effects to a Flutter widget subtree,
  with per-child colour opt-out via Unveiled. Crash-safe and performance-optimised.
version: 1.1.0git config user.name
homepage: https://github.com/SamratAlShahriar/veil
repository: https://github.com/SamratAlShahriar/veil
issue_tracker: https://github.com/SamratAlShahriar/veil/issues

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

topics:
  - ui
  - animation
  - filter
  - effects
  - widget